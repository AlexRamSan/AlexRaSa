<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGO-FIX Scanner | Salesforce</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; padding: 20px; display: flex; justify-content: center; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 16px; max-width: 400px; width: 100%; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #ffcc00; text-align: center; margin-top: 0; letter-spacing: 1px; }
        .logo-sub { text-align: center; font-size: 12px; color: #888; margin-bottom: 20px; text-transform: uppercase; }
        
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 15px; }
        input[type="text"], input[type="email"] { background: #2a2a2a; color: white; border: 1px solid #444; transition: border 0.3s; }
        input[type="text"]:focus, input[type="email"]:focus { border-color: #ffcc00; outline: none; }
        
        button { background: #ffcc00; color: black; font-weight: bold; cursor: pointer; transition: background 0.3s, transform 0.1s; }
        button:hover { background: #e6b800; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #555; cursor: not-allowed; color: #888; }
        
        #preview { width: 100%; border-radius: 10px; display: none; margin-bottom: 15px; border: 2px solid #333; }
        .loading { text-align: center; color: #ffcc00; display: none; font-weight: bold; padding: 15px; }
        label { font-size: 11px; color: #ffcc00; margin-left: 5px; font-weight: bold; text-transform: uppercase; }
        
        .status-msg { padding: 10px; border-radius: 6px; margin-top: 10px; display: none; text-align: center; font-size: 14px; }
        .error { background: #441111; color: #ff9999; border: 1px solid #662222; }
        .success { background: #114411; color: #99ff99; border: 1px solid #226622; }
    </style>
</head>
<body>

<div class="card">
    <h2>SCANNER</h2>
    <div class="logo-sub">Salesforce Integration</div>
    
    <input type="file" id="camera" accept="image/*" capture="environment">
    <img id="preview" alt="Vista previa">
    
    <div id="loader" class="loading">Procesando con GPT-4o...</div>
    <div id="statusBox" class="status-msg"></div>

    <div id="resultForm" style="display:none;">
        <label>Empresa / Cuenta</label>
        <input type="text" id="co" placeholder="Nombre de la empresa">
        
        <label>Nombre</label>
        <input type="text" id="fn" placeholder="Nombre">
        
        <label>Apellido</label>
        <input type="text" id="ln" placeholder="Apellido">
        
        <label>Correo Electrónico</label>
        <input type="email" id="em" placeholder="ejemplo@correo.com">
        
        <label>Teléfono</label>
        <input type="text" id="ph" placeholder="Teléfono">
        
        <button id="sendBtn">GUARDAR EN SALESFORCE</button>
    </div>
</div>

<script>
    const camera = document.getElementById('camera');
    const preview = document.getElementById('preview');
    const loader = document.getElementById('loader');
    const resultForm = document.getElementById('resultForm');
    const sendBtn = document.getElementById('sendBtn');
    const statusBox = document.getElementById('statusBox');

    const API_URL = 'https://alex-ra-sa.vercel.app/api/reconocimiento';
    let base64Image = "";

    function showStatus(msg, type) {
        statusBox.innerText = msg;
        statusBox.className = `status-msg ${type}`;
        statusBox.style.display = 'block';
    }

    camera.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Reset UI
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        loader.style.display = 'block';
        resultForm.style.display = 'none';
        statusBox.style.display = 'none';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = async () => {
            base64Image = reader.result;
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || "Error al procesar imagen");

                const info = data.cardData;

                // Llenar formulario
                document.getElementById('co').value = info.company || '';
                document.getElementById('fn').value = info.firstName || '';
                document.getElementById('ln').value = info.lastName || '';
                document.getElementById('em').value = info.email || '';
                document.getElementById('ph').value = info.phone || '';

                loader.style.display = 'none';
                resultForm.style.display = 'block';
            } catch (err) {
                loader.style.display = 'none';
                showStatus("Error: " + err.message, "error");
            }
        };
    });

    sendBtn.onclick = async () => {
        sendBtn.disabled = true;
        sendBtn.innerText = "SINCRONIZANDO...";
        statusBox.style.display = 'none';

        const payload = {
            confirmData: {
                company: document.getElementById('co').value,
                firstName: document.getElementById('fn').value,
                lastName: document.getElementById('ln').value,
                email: document.getElementById('em').value,
                phone: document.getElementById('ph').value
            }
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            
            if (result.success) {
                showStatus("¡Registrado con éxito en Salesforce!", "success");
                sendBtn.innerText = "¡LISTO!";
                setTimeout(() => location.reload(), 3000); 
            } else {
                throw new Error(result.error || "Error desconocido en el servidor");
            }
        } catch (err) {
            showStatus("Error Salesforce: " + err.message, "error");
            sendBtn.disabled = false;
            sendBtn.innerText = "REINTENTAR ENVÍO";
        }
    };
</script>

</body>
</html>
