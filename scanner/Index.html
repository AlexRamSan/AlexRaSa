<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGO-FIX Scanner | Sales</title>
    <style>
        :root { --rf-red: #E30613; --rf-black: #000000; --rf-grey: #1A1A1A; --rf-light: #D1D3D4; }
        body { font-family: Arial, sans-serif; background: var(--rf-black); color: white; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .card { background: var(--rf-grey); padding: 30px; border-radius: 4px; max-width: 420px; width: 100%; border-top: 5px solid var(--rf-red); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .sub { text-align: center; font-size: 10px; color: var(--rf-light); margin-bottom: 25px; text-transform: uppercase; }
        
        label { font-size: 10px; color: var(--rf-red); font-weight: bold; text-transform: uppercase; display: block; margin: 12px 0 4px 2px; }
        input { width: 100%; padding: 12px; border-radius: 2px; border: 1px solid #333; background: white; color: black; font-size: 15px; box-sizing: border-box; }
        input:focus { border-color: var(--rf-red); outline: none; }
        
        button { width: 100%; padding: 15px; background: var(--rf-red); color: white; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:disabled { background: #444; color: #888; }
        
        #preview { width: 100%; border-radius: 2px; display: none; margin-bottom: 20px; border: 1px solid #444; }
        .loading { text-align: center; color: var(--rf-red); display: none; font-weight: bold; padding: 20px; }
        .status { padding: 15px; border-radius: 2px; margin-top: 15px; display: none; text-align: center; font-weight: bold; }
        .success { background: #155724; color: #d4edda; }
        .error { background: #721c24; color: #f8d7da; }
    </style>
</head>
<body>

<div class="card">
    <h2>REGO-FIX</h2>
    <div class="sub">AI Business Card Scanner</div>
    
    <input type="file" id="camera" accept="image/*" capture="environment">
    <img id="preview">
    <div id="loader" class="loading">INVESTIGANDO EMPRESA...</div>
    <div id="statusBox" class="status"></div>

    <div id="resultForm" style="display:none;">
        <label>Empresa / Cuenta</label>
        <input type="text" id="co">
        <label>Sitio Web</label>
        <input type="text" id="web">
        <label>Industria</label>
        <input type="text" id="ind">
        
        <div style="height: 1px; background: #333; margin: 20px 0;"></div>

        <label>Nombre</label>
        <input type="text" id="fn">
        <label>Apellido</label>
        <input type="text" id="ln">
        <label>Email</label>
        <input type="email" id="em">
        <label>Teléfono</label>
        <input type="text" id="ph">
        
        <button id="sendBtn">SINCRONIZAR CON SALESFORCE</button>
    </div>
</div>

<script>
    const camera = document.getElementById('camera');
    const preview = document.getElementById('preview');
    const loader = document.getElementById('loader');
    const resultForm = document.getElementById('resultForm');
    const sendBtn = document.getElementById('sendBtn');
    const statusBox = document.getElementById('statusBox');

    const API_URL = 'https://alex-ra-sa.vercel.app/api/reconocimiento';

    camera.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        loader.style.display = 'block';
        resultForm.style.display = 'none';
        statusBox.style.display = 'none';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = async () => {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: reader.result })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                const info = data.cardData;
                document.getElementById('co').value = info.company || '';
                document.getElementById('web').value = info.website || '';
                document.getElementById('ind').value = info.industry || '';
                document.getElementById('fn').value = info.firstName || '';
                document.getElementById('ln').value = info.lastName || '';
                document.getElementById('em').value = info.email || '';
                document.getElementById('ph').value = info.phone || '';

                loader.style.display = 'none';
                resultForm.style.display = 'block';
            } catch (err) {
                loader.style.display = 'none';
                statusBox.innerText = "Error: " + err.message;
                statusBox.className = "status error";
                statusBox.style.display = "block";
            }
        };
    });

    sendBtn.onclick = async () => {
        sendBtn.disabled = true;
        sendBtn.innerText = "ENVIANDO A SALESFORCE...";
        
        const payload = {
            confirmData: {
                company: document.getElementById('co').value,
                website: document.getElementById('web').value,
                industry: document.getElementById('ind').value,
                firstName: document.getElementById('fn').value,
                lastName: document.getElementById('ln').value,
                email: document.getElementById('em').value,
                phone: document.getElementById('ph').value
            }
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.success) {
                statusBox.innerText = "¡Sincronizado con éxito!";
                statusBox.className = "status success";
                statusBox.style.display = "block";
                setTimeout(() => location.reload(), 3000);
            } else {
                throw new Error(result.error);
            }
        } catch (err) {
            statusBox.innerText = "Error Salesforce: " + err.message;
            statusBox.className = "status error";
            statusBox.style.display = "block";
            sendBtn.disabled = false;
        }
    };
</script>
</body>
</html>
