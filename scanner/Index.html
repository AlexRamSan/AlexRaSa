<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGO-FIX Scanner | Salesforce</title>
    <style>
        /* PALETA DE COLORES REGO-FIX */
        :root {
            --rf-red: #E30613; /* Rojo corporativo principal */
            --rf-black: #000000;
            --rf-dark-grey: #1A1A1A;
            --rf-mid-grey: #333333;
            --rf-light-grey: #D1D3D4;
            --rf-white: #FFFFFF;
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Tipografía más limpia y profesional */
            background: var(--rf-black); 
            color: var(--rf-white); 
            padding: 20px; 
            display: flex; 
            justify-content: center;
            margin: 0;
        }

        .card { 
            background: var(--rf-dark-grey); 
            padding: 30px; 
            border-radius: 4px; /* Bordes menos redondeados, más industriales */
            max-width: 420px; 
            width: 100%; 
            border-top: 4px solid var(--rf-red); /* Acento superior en rojo */
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
        }

        h2 { 
            color: var(--rf-white); 
            text-align: center; 
            margin-top: 0; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 700;
        }

        .logo-sub { 
            text-align: center; 
            font-size: 11px; 
            color: var(--rf-light-grey); 
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        
        /* Estilo para el input de archivo personalizado */
        input[type="file"] {
            background: var(--rf-mid-grey);
            border: 1px solid var(--rf-mid-grey);
            color: var(--rf-white);
            cursor: pointer;
        }

        input, button { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0; 
            border-radius: 2px; /* Bordes rectos */
            border: none; 
            box-sizing: border-box; 
            font-size: 15px; 
        }

        /* Estilos de los campos de texto al estilo REGO-FIX */
        input[type="text"], input[type="email"] { 
            background: var(--rf-white); /* Fondo blanco para inputs para máximo contraste y legibilidad */
            color: var(--rf-black); 
            border: 1px solid var(--rf-light-grey); 
            transition: border-color 0.3s, box-shadow 0.3s; 
        }

        input[type="text"]:focus, input[type="email"]:focus { 
            border-color: var(--rf-red); /* Foco en rojo */
            outline: none; 
            box-shadow: 0 0 0 3px rgba(227, 6, 19, 0.2);
        }
        
        /* Botón Principal en Rojo REGO-FIX */
        button { 
            background: var(--rf-red); 
            color: var(--rf-white); 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer; 
            transition: background 0.3s, transform 0.1s; 
            margin-top: 15px;
        }

        button:hover { 
            background: #b3050f; /* Un rojo más oscuro al pasar el mouse */
        }

        button:active { 
            transform: scale(0.98); 
        }

        button:disabled { 
            background: var(--rf-mid-grey); 
            cursor: not-allowed; 
            color: var(--rf-light-grey); 
        }
        
        #preview { 
            width: 100%; 
            border-radius: 2px; 
            display: none; 
            margin-bottom: 20px; 
            border: 1px solid var(--rf-mid-grey); 
        }

        .loading { 
            text-align: center; 
            color: var(--rf-red); /* Texto de carga en rojo */
            display: none; 
            font-weight: bold; 
            padding: 15px; 
            font-size: 14px;
            text-transform: uppercase;
        }

        label { 
            font-size: 11px; 
            color: var(--rf-light-grey); /* Etiquetas sutiles */
            margin-left: 2px; 
            font-weight: bold; 
            text-transform: uppercase; 
            display: block;
            margin-top: 12px;
            margin-bottom: 2px;
        }
        
        /* Mensajes de estado integrados */
        .status-msg { 
            padding: 12px; 
            border-radius: 2px; 
            margin-top: 15px; 
            display: none; 
            text-align: center; 
            font-size: 14px; 
            font-weight: bold;
        }

        .error { 
            background: #f8d7da; 
            color: #721c24; 
            border: 1px solid #f5c6cb; 
        }

        .success { 
            background: #d4edda; 
            color: #155724; 
            border: 1px solid #c3e6cb; 
        }
    </style>
</head>
<body>

<div class="card">
    <h2>SCANNER</h2>
    <div class="logo-sub">Salesforce Integration</div>
    
    <input type="file" id="camera" accept="image/*" capture="environment">
    
    <img id="preview" alt="Vista previa de la tarjeta">
    
    <div id="loader" class="loading">Procesando con GPT-4o...</div>
    <div id="statusBox" class="status-msg"></div>

    <div id="resultForm" style="display:none;">
        <label>Empresa / Cuenta</label>
        <input type="text" id="co" placeholder="Nombre de la empresa">
        
        <label>Nombre</label>
        <input type="text" id="fn" placeholder="Nombre">
        
        <label>Apellido</label>
        <input type="text" id="ln" placeholder="Apellido">
        
        <label>Correo Electrónico</label>
        <input type="email" id="em" placeholder="ejemplo@correo.com">
        
        <label>Teléfono</label>
        <input type="text" id="ph" placeholder="Teléfono">
        
        <button id="sendBtn">GUARDAR EN SALESFORCE</button>
    </div>
</div>

<script>
    const camera = document.getElementById('camera');
    const preview = document.getElementById('preview');
    const loader = document.getElementById('loader');
    const resultForm = document.getElementById('resultForm');
    const sendBtn = document.getElementById('sendBtn');
    const statusBox = document.getElementById('statusBox');

    // Mantenemos tu URL de Vercel actual
    const API_URL = 'https://alex-ra-sa.vercel.app/api/reconocimiento';
    let base64Image = "";

    function showStatus(msg, type) {
        statusBox.innerText = msg;
        statusBox.className = `status-msg ${type}`;
        statusBox.style.display = 'block';
    }

    camera.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Reset UI
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        loader.style.display = 'block';
        resultForm.style.display = 'none';
        statusBox.style.display = 'none';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = async () => {
            base64Image = reader.result;
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || "Error al procesar imagen");

                const info = data.cardData;

                // Llenar formulario
                document.getElementById('co').value = info.company || '';
                document.getElementById('fn').value = info.firstName || '';
                document.getElementById('ln').value = info.lastName || '';
                document.getElementById('em').value = info.email || '';
                document.getElementById('ph').value = info.phone || '';

                loader.style.display = 'none';
                resultForm.style.display = 'block';
            } catch (err) {
                loader.style.display = 'none';
                showStatus("Error: " + err.message, "error");
            }
        };
    });

    sendBtn.onclick = async () => {
        sendBtn.disabled = true;
        sendBtn.innerText = "SINCRONIZANDO...";
        statusBox.style.display = 'none';

        const payload = {
            confirmData: {
                company: document.getElementById('co').value,
                firstName: document.getElementById('fn').value,
                lastName: document.getElementById('ln').value,
                email: document.getElementById('em').value,
                phone: document.getElementById('ph').value
            }
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            
            if (result.success) {
                showStatus("¡Registrado con éxito en Salesforce!", "success");
                sendBtn.innerText = "¡LISTO!";
                setTimeout(() => location.reload(), 3000); 
            } else {
                throw new Error(result.error || "Error desconocido en el servidor");
            }
        } catch (err) {
            showStatus("Error Salesforce: " + err.message, "error");
            sendBtn.disabled = false;
            sendBtn.innerText = "REINTENTAR ENVÍO";
        }
    };
</script>

</body>
</html>
