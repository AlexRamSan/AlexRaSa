<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGO-FIX Scanner | AlexRasa</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; border: 1px solid #333; }
        h2 { color: #ffcc00; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        input[type="text"], input[type="email"] { background: #2a2a2a; color: white; border: 1px solid #444; }
        button { background: #ffcc00; color: black; font-weight: bold; cursor: pointer; }
        #preview { width: 100%; border-radius: 8px; display: none; margin-bottom: 10px; }
        .loading { text-align: center; color: #ffcc00; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Scanner de Tarjetas</h2>
    <input type="file" id="camera" accept="image/*" capture="environment">
    <img id="preview">
    
    <div id="loader" class="loading">Procesando imagen con IA...</div>

    <div id="resultForm" style="display:none;">
        <input type="text" id="fn" placeholder="Nombre">
        <input type="text" id="ln" placeholder="Apellido">
        <input type="email" id="em" placeholder="Correo">
        <input type="text" id="ph" placeholder="Teléfono">
        <button id="sendBtn">ENVIAR A SALESFORCE</button>
    </div>
</div>

<script>
    const camera = document.getElementById('camera');
    const preview = document.getElementById('preview');
    const loader = document.getElementById('loader');
    const resultForm = document.getElementById('resultForm');

    camera.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Mostrar foto
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        loader.style.display = 'block';
        resultForm.style.display = 'none';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = async () => {
            try {
                // USANDO TU APP DE VERCEL
                const response = await fetch('https://alex-ra-sa.vercel.app/api/reconocimiento', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: reader.result })
                });

                const data = await response.json();

                document.getElementById('fn').value = data.firstName || '';
                document.getElementById('ln').value = data.lastName || '';
                document.getElementById('em').value = data.email || '';
                document.getElementById('ph').value = data.phone || '';

                loader.style.display = 'none';
                resultForm.style.display = 'block';
            } catch (err) {
                alert("Error: " + err.message);
                loader.style.display = 'none';
            }
        };
    });

    document.getElementById('sendBtn').onclick = () => {
        alert("Enviando a Salesforce...");
        // Próximo paso: crear el endpoint de Salesforce en Vercel
    };
</script>

</body>
</html>
