<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>REGO-FIX Smart Command | Miguel Ramirez</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --rego-red: #D31B23; --rego-blue: #28556C; --rego-green: #B7C91F; }
    body { background: #f8fafc; font-family: 'Inter', sans-serif; color: #1e293b; }
    .glass-card { background: white; border-radius: 32px; border: 1px solid rgba(40,85,108,0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
    .input-pro { width: 100%; border: 2px solid #f1f5f9; border-radius: 16px; padding: 1rem; outline: none; transition: 0.3s; background: #fff; font-weight: 600; }
    .input-pro:focus { border-color: var(--rego-blue); box-shadow: 0 0 0 4px rgba(40,85,108,0.05); }
    .btn-rego { background: var(--rego-red); color: white; font-weight: 900; border-radius: 16px; padding: 1.2rem; transition: 0.3s; width: 100%; text-transform: uppercase; }
    .btn-rego:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(211,27,35,0.2); }
  </style>
</head>
<body class="py-12 px-4">

  <main class="max-w-4xl mx-auto">
    
    <div class="flex flex-col md:flex-row items-center justify-between mb-10 gap-4">
        <img src="/assets/regofixlogo.png" class="h-10" onerror="this.src='https://alexrasa.store/assets/regofixlogo.png'">
        <div class="text-center md:text-right border-l-4 border-red-600 pl-4">
            <h2 class="text-xl font-black text-[#28556C] italic uppercase">Engineering Command</h2>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">By Miguel Alejandro Ramirez</p>
        </div>
    </div>

    <div class="glass-card overflow-hidden">
      <div class="p-8 md:p-12 border-b border-gray-100">
        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-black uppercase text-gray-400 mb-2 block ml-2 italic underline">Material de la Pieza (NLU Search)</label>
                <input id="material_texto" class="input-pro" placeholder="Ej: Acero 4140 templado a 35 HRC o Titanio Grado 5...">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 mb-2 block ml-2 italic underline">Herramienta y Estrategia</label>
                    <select id="tool_material" class="input-pro mb-4 font-bold text-[#28556C]">
                        <option value="Carburo">Carburo Sólido (HM)</option>
                        <option value="HSS">HSS-Cobalto</option>
                        <option value="Ceramica">Cerámica / PCD</option>
                    </select>
                    <select id="aplicacion" class="input-pro font-bold text-[#28556C]">
                        <option value="Desbaste Pesado">Desbaste Pesado (HD)</option>
                        <option value="Acabado">Acabado Fino</option>
                        <option value="Trocoidal">Trocoidal / HEM</option>
                        <option value="Slotting">Ranurado (Slotting)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 mb-2 block ml-2 italic underline">Geometría y Coolant</label>
                    <div class="grid grid-cols-2 gap-2 mb-4 italic">
                        <input id="diametro" type="number" step="0.1" class="input-pro text-center" value="12" placeholder="Ø mm">
                        <input id="largo" type="number" class="input-pro text-center" value="45" placeholder="Largo mm">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input id="z" type="number" class="input-pro text-center font-bold" value="4" placeholder="Filos Z">
                        <select id="coolant" class="input-pro text-xs font-bold text-[#28556C]">
                            <option value="Interno">Refrig. Interna</option>
                            <option value="Externo">Refrig. Externa</option>
                            <option value="MQL">MQL / Aire</option>
                        </select>
                    </div>
                </div>
            </div>

            <button onclick="ejecutarAnalisis()" id="btnGo" class="btn-rego">
                Generar Propuesta Técnica
            </button>
        </div>
      </div>

      <div id="loading" class="hidden p-20 text-center animate-pulse"><div class="h-12 w-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin inline-block"></div></div>

      <div id="resultado" class="hidden p-8 md:p-12 bg-slate-50">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="bg-[#28556C] rounded-[24px] p-8 text-white shadow-xl relative">
                <span class="text-[10px] font-black uppercase opacity-50 tracking-widest italic underline">Propuesta REGO-FIX</span>
                <h2 id="res-holder" class="text-3xl font-black italic mt-4">---</h2>
                <h3 id="res-collet" class="text-sm font-bold text-[#B7C91F] mt-1 italic">---</h3>
                
                <div class="mt-8 grid grid-cols-2 gap-4">
                    <div class="bg-white/10 p-4 rounded-2xl text-center"><span class="block text-[8px] uppercase font-bold text-blue-200">Precisión TIR</span><span id="res-tir" class="text-xs font-black">---</span></div>
                    <div class="bg-white/10 p-4 rounded-2xl text-center"><span class="block text-[8px] uppercase font-bold text-blue-200">Balanceo</span><span class="text-xs font-black">G2.5 @ 25k</span></div>
                </div>
            </div>

            <div class="space-y-4 flex flex-col justify-center">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200 flex justify-between items-center px-8">
                    <span class="text-[10px] font-black uppercase text-gray-400 italic">RPM Óptimas</span>
                    <span id="res-rpm" class="text-4xl font-black text-[#28556C]">0</span>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200 flex justify-between items-center px-8">
                    <span class="text-[10px] font-black uppercase text-gray-400 italic">Avance (mm/min)</span>
                    <span id="res-feed" class="text-4xl font-black text-[#28556C]">0</span>
                </div>
            </div>
        </div>

        <div class="bg-white p-10 rounded-[32px] border-l-[12px] border-[#B7C91F] shadow-lg">
            <div class="flex items-center gap-2 mb-4 text-[#28556C]">
                <h5 class="text-[10px] font-black uppercase italic underline tracking-widest">Dictamen Técnico y Guía de Aplicación</h5>
            </div>
            <p id="res-nota" class="text-sm font-medium italic text-slate-600 leading-relaxed"></p>
        </div>
      </div>
    </div>
  </main>

  <script>
    async function ejecutarAnalisis() {
        const btn = document.getElementById('btnGo');
        const data = {
            material_texto: document.getElementById('material_texto').value,
            tool_material: document.getElementById('tool_material').value,
            aplicacion: document.getElementById('aplicacion').value,
            diametro: document.getElementById('diametro').value,
            largo: document.getElementById('largo').value,
            z: document.getElementById('z').value,
            coolant: document.getElementById('coolant').value
        };

        if(!data.material_texto) return alert("Escribe el material de la pieza.");

        btn.disabled = true;
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('resultado').classList.add('hidden');

        try {
            const res = await fetch('/api/cut-conditions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const resData = await res.json();

            document.getElementById('res-holder').innerText = resData.holder;
            document.getElementById('res-collet').innerText = "Collet: " + resData.collet;
            document.getElementById('res-tir').innerText = resData.tir;
            document.getElementById('res-rpm').innerText = resData.new_rpm.toLocaleString();
            document.getElementById('res-feed').innerText = resData.new_feed.toLocaleString();
            document.getElementById('res-nota').innerText = resData.nota;

            document.getElementById('resultado').classList.remove('hidden');
        } catch (e) {
            alert("Error en el comando de ingeniería.");
        } finally {
            btn.disabled = false;
            document.getElementById('loading').classList.add('hidden');
        }
    }
  </script>
</body>
</html>
