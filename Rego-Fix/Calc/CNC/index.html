<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>REGO-FIX Quick Guide | AlexRaSa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --rego-red: #D31B23; --rego-blue: #28556C; }
    body { background: #f4f4f4; font-family: 'Inter', sans-serif; }
    .label-f { font-size: 0.7rem; font-weight: 800; color: var(--rego-blue); text-transform: uppercase; margin-bottom: 4px; display: block; }
    .input-f { width: 100%; border: 1px solid #ccc; border-radius: 8px; padding: 0.6rem; font-weight: 600; outline: none; }
    .input-f:focus { border-color: var(--rego-red); }
    .card-res { background: var(--rego-blue); color: white; border-radius: 16px; padding: 1.5rem; }
  </style>
</head>
<body class="py-10 px-4">

  <main class="max-w-3xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-200">
    <div class="bg-gray-50 p-6 flex justify-between items-center border-b">
        <img src="/assets/regofixlogo.png" class="h-8" onerror="this.src='https://alexrasa.store/assets/regofixlogo.png'">
        <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Calculadora de Condiciones Óptimas</span>
    </div>

    <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="md:col-span-2">
            <label class="label-f">Material de la Pieza (Manual)</label>
            <input id="material_texto" class="input-f" placeholder="Escriba material y dureza...">
        </div>
        <div>
            <label class="label-f">Interfaz Husillo</label>
            <select id="cono" class="input-f">
                <option value="HSK-A 63">HSK-A 63</option>
                <option value="CAT 40">CAT 40</option>
                <option value="BT 40">BT 40</option>
                <option value="CAPTO C6">CAPTO C6</option>
            </select>
        </div>
        <div>
            <label class="label-f">Material Herramienta</label>
            <select id="tool_material" class="input-f">
                <option value="Carburo">Carburo Sólido</option>
                <option value="HSS">HSS / Cobalto</option>
            </select>
        </div>
        <div>
            <label class="label-f">Ø (mm)</label>
            <input id="diametro" type="number" class="input-f" value="12">
        </div>
        <div>
            <label class="label-f">Filos (Z)</label>
            <input id="z" type="number" class="input-f" value="4">
        </div>
        <div class="md:col-span-2">
            <label class="label-f">Operación</label>
            <select id="aplicacion" class="input-f">
                <option value="Desbaste">Desbaste (HPC)</option>
                <option value="Acabado">Acabado</option>
                <option value="Trocoidal">Trocoidal (HEM)</option>
            </select>
        </div>
        <button onclick="calcular()" class="md:col-span-2 bg-[#D31B23] text-white font-black py-4 rounded-xl uppercase tracking-widest hover:brightness-90 transition-all">Optimizar Condiciones</button>
    </div>

    <div id="resultado" class="hidden p-8 border-t bg-gray-50">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="card-res">
                <span class="text-[9px] uppercase font-bold opacity-70 tracking-widest">Ensamble Recomendado</span>
                <h3 id="res-holder" class="text-xl font-black italic mt-1 uppercase">---</h3>
                <p id="res-pinza" class="text-[#B7C91F] text-xs font-bold mt-1 uppercase tracking-tight italic">---</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-xl border border-gray-200 text-center">
                    <span class="label-f m-0">RPM</span>
                    <span id="res-rpm" class="text-xl font-black text-[#28556C]">0</span>
                </div>
                <div class="bg-white p-4 rounded-xl border border-gray-200 text-center">
                    <span class="label-f m-0">Avance</span>
                    <span id="res-feed" class="text-xl font-black text-[#28556C]">0</span>
                </div>
            </div>
        </div>
        <div class="bg-white p-6 rounded-xl border-l-4 border-[#B7C91F]">
            <span id="res-mejora" class="text-[10px] font-black text-green-600 uppercase block mb-1 tracking-widest">---</span>
            <p id="res-nota" class="text-xs font-bold italic text-gray-600 leading-snug"></p>
        </div>
    </div>
  </main>

  <script>
    async function calcular() {
        const data = {
            material_texto: document.getElementById('material_texto').value,
            cono: document.getElementById('cono').value,
            tool_material: document.getElementById('tool_material').value,
            diametro: document.getElementById('diametro').value,
            z: document.getElementById('z').value,
            aplicacion: document.getElementById('aplicacion').value
        };
        if(!data.material_texto) return alert("Escribe el material.");

        document.getElementById('resultado').classList.add('hidden');

        try {
            const res = await fetch('/api/cut-conditions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const r = await res.json();
            
            document.getElementById('res-holder').innerText = r.holder;
            document.getElementById('res-pinza').innerText = r.pinza;
            document.getElementById('res-rpm').innerText = r.rpm.toLocaleString();
            document.getElementById('res-feed').innerText = r.feed.toLocaleString();
            document.getElementById('res-mejora').innerText = r.mejora + " — TIR < 3µm Garantizado";
            document.getElementById('res-nota').innerText = r.nota;
            document.getElementById('resultado').classList.remove('hidden');
        } catch(e) { alert("Error."); }
    }
  </script>
</body>
</html>
