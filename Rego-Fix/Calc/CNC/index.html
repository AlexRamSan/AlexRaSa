<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>REGO-FIX Command Center | Miguel Ramirez</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --rego-red: #D31B23; --rego-blue: #28556C; --rego-green: #B7C91F; }
    body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
    .terminal-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .input-tech { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 1rem; color: #38bdf8; outline: none; transition: 0.3s; font-family: monospace; }
    .input-tech:focus { border-color: var(--rego-red); box-shadow: 0 0 15px rgba(211,27,35,0.2); }
    .label-tech { font-size: 0.7rem; font-weight: 900; color: #94a3b8; text-transform: uppercase; margin-bottom: 0.5rem; display: block; letter-spacing: 1px; }
    .btn-execute { background: var(--rego-red); color: white; font-weight: 900; border-radius: 12px; padding: 1.2rem; width: 100%; text-transform: uppercase; letter-spacing: 2px; }
    .btn-execute:hover { background: #b91c1c; transform: scale(1.01); }
  </style>
</head>
<body class="py-10 px-4">

  <main class="max-w-4xl mx-auto">
    
    <div class="flex justify-between items-end mb-8 px-4">
        <img src="/assets/regofixlogo.png" class="h-8 invert opacity-80" onerror="this.src='https://alexrasa.store/assets/regofixlogo.png'">
        <div class="text-right">
            <p class="text-[10px] font-bold text-red-500 tracking-[0.3em] uppercase">Tech-Sales Interface</p>
            <p class="text-xs font-mono text-gray-500">USER: M_RAMIREZ_REGOFIX</p>
        </div>
    </div>

    <div class="terminal-card overflow-hidden">
      <div class="p-8 md:p-10 bg-[#1e293b]">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div class="md:col-span-2">
                <label class="label-tech">Descripción del Material de la Pieza</label>
                <input id="material_texto" class="input-tech" placeholder="> Ingrese material y dureza (ej: Inox 316 35HRC)...">
            </div>

            <div>
                <label class="label-tech">Material de Herramienta de Corte</label>
                <select id="tool_material" class="input-tech">
                    <option value="Carburo">Carburo Sólido (HM)</option>
                    <option value="HSS">HSS-Cobalto</option>
                    <option value="Ceramica">Cerámica / PCD</option>
                </select>
            </div>

            <div>
                <label class="label-tech">Operación a Ejecutar</label>
                <select id="aplicacion" class="input-tech">
                    <option value="Desbaste Pesado">Desbaste Pesado (HPC)</option>
                    <option value="Acabado">Acabado Fino</option>
                    <option value="Trocoidal">Trocoidal / HEM</option>
                    <option value="Roscado">Roscado Rígido (TAP)</option>
                    <option value="Micro">Micro-mecanizado</option>
                </select>
            </div>

            <div class="grid grid-cols-3 gap-4 md:col-span-2">
                <div><label class="label-tech">Ø (mm)</label><input id="diametro" type="number" class="input-tech text-center" value="12"></div>
                <div><label class="label-tech">Largo (mm)</label><input id="largo" type="number" class="input-tech text-center" value="45"></div>
                <div><label class="label-tech">Dientes (Z)</label><input id="z" type="number" class="input-tech text-center" value="4"></div>
            </div>
        </div>

        <button onclick="runDiagnostic()" id="btnAction" class="btn-execute shadow-2xl">
            Ejecutar Diagnóstico Técnico
        </button>
      </div>

      <div id="loader" class="hidden p-20 text-center"><div class="h-10 w-10 border-4 border-red-600 border-t-transparent rounded-full animate-spin inline-block"></div></div>

      <div id="display" class="hidden border-t border-slate-700 bg-[#0f172a] p-8 md:p-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="space-y-6">
                <div class="border-l-4 border-red-600 pl-6 py-2">
                    <span class="label-tech text-red-500">Sistema Recomendado</span>
                    <h2 id="res-sistema" class="text-3xl font-black tracking-tighter text-white uppercase italic">---</h2>
                    <p id="res-pinza" class="text-[#B7C91F] font-mono text-sm mt-1">---</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 text-center">
                        <span class="label-tech">Concentridad</span>
                        <span id="res-tir" class="text-white font-bold text-sm">---</span>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 text-center">
                        <span class="label-tech">Balanceo</span>
                        <span class="text-white font-bold text-sm">G2.5 @ 25k</span>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 rounded-3xl p-8 border border-slate-800 space-y-6">
                <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                    <span class="label-tech m-0">RPM Sugeridas</span>
                    <span id="res-rpm" class="text-3xl font-black text-white">0</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="label-tech m-0">Avance (mm/min)</span>
                    <span id="res-feed" class="text-3xl font-black text-white">0</span>
                </div>
            </div>
        </div>

        <div class="mt-10 bg-slate-800/30 p-8 rounded-2xl border border-slate-700">
            <span class="label-tech mb-4 text-[#B7C91F]">Análisis de Ingeniería Aplicada:</span>
            <p id="res-nota" class="text-sm font-medium leading-relaxed text-gray-400 italic"></p>
        </div>
      </div>
    </div>
  </main>

  <script>
    async function runDiagnostic() {
        const btn = document.getElementById('btnAction');
        const data = {
            material_texto: document.getElementById('material_texto').value,
            tool_material: document.getElementById('tool_material').value,
            aplicacion: document.getElementById('aplicacion').value,
            diametro: document.getElementById('diametro').value,
            largo: document.getElementById('largo').value,
            z: document.getElementById('z').value
        };

        if(!data.material_texto) return alert("Ingrese el material para el análisis.");

        btn.disabled = true;
        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('display').classList.add('hidden');

        try {
            const res = await fetch('/api/cut-conditions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();

            document.getElementById('res-sistema').innerText = result.sistema;
            document.getElementById('res-pinza').innerText = result.pinza;
            document.getElementById('res-tir').innerText = result.tir;
            document.getElementById('res-rpm').innerText = result.new_rpm.toLocaleString();
            document.getElementById('res-feed').innerText = result.new_feed.toLocaleString();
            document.getElementById('res-nota').innerText = result.nota;

            document.getElementById('display').classList.remove('hidden');
        } catch (e) {
            alert("Error en la conexión con el núcleo de ingeniería.");
        } finally {
            btn.disabled = false;
            document.getElementById('loader').classList.add('hidden');
        }
    }
  </script>
</body>
</html>
