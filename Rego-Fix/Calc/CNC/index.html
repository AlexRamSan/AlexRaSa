<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>REGO-FIX Smart Engineering | Miguel Ramirez</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --rego-red: #D31B23; --rego-blue: #28556C; }
    body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
    .input-pro { width: 100%; background: white; border: 2px solid #e2e8f0; border-radius: 16px; padding: 1rem; outline: none; transition: 0.3s; font-weight: 600; }
    .input-pro:focus { border-color: var(--rego-blue); box-shadow: 0 0 0 5px rgba(40,85,108,0.1); }
    .btn-rego { background: var(--rego-red); color: white; font-weight: 900; border-radius: 18px; padding: 1.2rem; width: 100%; transition: 0.3s; text-transform: uppercase; }
  </style>
</head>
<body class="py-10 px-4">

  <main class="max-w-4xl mx-auto">
    <div class="bg-white rounded-[32px] shadow-2xl overflow-hidden border border-gray-100">
      
      <div class="p-8 md:p-12">
        <header class="mb-10">
            <img src="/assets/regofixlogo.png" class="h-10 mb-4" onerror="this.src='https://alexrasa.store/assets/regofixlogo.png'">
            <h1 class="text-3xl font-black text-[#28556C]">Engineering Command Center</h1>
            <p class="text-gray-400 font-bold text-xs uppercase tracking-widest mt-1">Miguel Alejandro Ramirez | Sales Technician</p>
        </header>

        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-2">Describe el Material (Texto Libre)</label>
                <input id="material_texto" class="input-pro" placeholder="Ej: Acero inoxidable 316L con 30 HRC de dureza...">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-2">Material de Herramienta</label>
                    <select id="tool_material" class="input-pro">
                        <option value="Carburo">Carburo Sólido (HM)</option>
                        <option value="HSS">HSS / Cobalto</option>
                        <option value="Ceramica">Cerámica / PCD</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-2">Operación Específica</label>
                    <select id="aplicacion" class="input-pro">
                        <option value="Desbaste">Desbaste (HD)</option>
                        <option value="Acabado">Acabado (Finishing)</option>
                        <option value="Trocoidal">Trocoidal (HEM)</option>
                        <option value="Ramping">Rampas (Ramping)</option>
                        <option value="Slotting">Ranurado Total (Slotting)</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div><label class="text-[10px] font-black uppercase text-gray-400">Ø (mm)</label><input id="diametro" type="number" class="input-pro" value="12"></div>
                <div><label class="text-[10px] font-black uppercase text-gray-400">Largo (mm)</label><input id="largo" type="number" class="input-pro" value="45"></div>
                <div><label class="text-[10px] font-black uppercase text-gray-400">Dientes (Z)</label><input id="z" type="number" class="input-pro" value="4"></div>
            </div>

            <button onclick="calcularTodo()" id="btnMain" class="btn-rego hover:scale-[1.02] active:scale-95 shadow-xl shadow-red-200">
                Optimizar Proceso
            </button>
        </div>
      </div>

      <div id="loading" class="hidden p-20 text-center"><div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-gray-100 border-t-red-600"></div></div>
      
      <div id="resultado" class="hidden p-8 md:p-12 bg-gray-50 border-t border-gray-100">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-[#28556C] rounded-[24px] p-8 text-white shadow-2xl">
                <span class="text-[10px] font-black uppercase opacity-50">Ensamble Recomendado</span>
                <h2 id="res-holder" class="text-3xl font-black italic mt-2">PG 15</h2>
                <div class="mt-6 space-y-2 border-t border-white/10 pt-4">
                    <p class="text-xs">Material Detectado: <span id="res-mat" class="font-bold text-[#B7C91F]">---</span></p>
                    <p class="text-xs text-blue-200">Precisión TIR: <span class="font-bold">&lt; 0.003mm</span></p>
                </div>
            </div>

            <div class="flex flex-col justify-center space-y-4">
                <div class="bg-white p-6 rounded-[20px] shadow-sm flex justify-between items-center border border-gray-200">
                    <span class="text-[10px] font-black uppercase text-gray-400 italic">Velocidad</span>
                    <span class="text-2xl font-black text-[#28556C]"><span id="res-rpm">0</span> <small class="text-xs">RPM</small></span>
                </div>
                <div class="bg-white p-6 rounded-[20px] shadow-sm flex justify-between items-center border border-gray-200">
                    <span class="text-[10px] font-black uppercase text-gray-400 italic">Avance</span>
                    <span class="text-2xl font-black text-[#28556C]"><span id="res-feed">0</span> <small class="text-xs">mm/min</small></span>
                </div>
            </div>
        </div>

        <div class="mt-8 bg-white p-8 rounded-[24px] border-l-[12px] border-[#B7C91F] shadow-sm">
            <h4 class="text-[10px] font-black uppercase text-blue-900 mb-2">Análisis Técnico y Guía de Aplicación</h4>
            <p id="res-nota" class="text-sm font-medium italic text-gray-600 leading-relaxed"></p>
        </div>
      </div>
    </div>
  </main>

  <script>
    async function calcularTodo() {
        const btn = document.getElementById('btnMain');
        const data = {
            material_texto: document.getElementById('material_texto').value,
            tool_material: document.getElementById('tool_material').value,
            aplicacion: document.getElementById('aplicacion').value,
            diametro: document.getElementById('diametro').value,
            largo: document.getElementById('largo').value,
            z: document.getElementById('z').value
        };

        if(!data.material_texto) return alert("Describe el material para que la IA pueda clasificarlo.");

        btn.disabled = true;
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('resultado').classList.add('hidden');

        try {
            const res = await fetch('/api/cut-conditions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const resData = await res.json();

            document.getElementById('res-holder').innerText = resData.holder;
            document.getElementById('res-mat').innerText = resData.material_detectado;
            document.getElementById('res-rpm').innerText = resData.new_rpm;
            document.getElementById('res-feed').innerText = resData.new_feed;
            document.getElementById('res-nota').innerText = resData.nota;

            document.getElementById('resultado').classList.remove('hidden');
        } catch (e) {
            alert("Error en el comando central.");
        } finally {
            btn.disabled = false;
            document.getElementById('loading').classList.add('hidden');
        }
    }
  </script>
</body>
</html>
