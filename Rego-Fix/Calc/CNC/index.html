<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>REGO-FIX Engineering Expert | AlexRaSa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --rego-red: #D31B23; --rego-blue: #28556C; --rego-green: #B7C91F; }
    body { background-color: #f9fafb; color: #1a1a1a; font-family: 'Inter', sans-serif; }
    .rego-card { background: white; border-radius: 24px; box-shadow: 0 15px 40px rgba(40,85,108,0.08); border: 1px solid rgba(40,85,108,0.1); }
    .input-rego { width: 100%; border: 1px solid #e2e8f0; border-radius: 14px; padding: 0.8rem; outline: none; transition: 0.2s; }
    .input-rego:focus { border-color: var(--rego-blue); box-shadow: 0 0 0 4px rgba(40,85,108,0.05); }
    .btn-rego { background: var(--rego-red); color: white; font-weight: 800; border-radius: 16px; padding: 1.2rem; transition: 0.3s; width: 100%; text-transform: uppercase; }
    .btn-rego:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(211,27,35,0.3); }
    .label-rego { display: block; font-size: 0.75rem; font-weight: 800; color: var(--rego-blue); text-transform: uppercase; margin-bottom: 0.5rem; }
    .badge-rego { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
  </style>
</head>
<body class="py-12 px-4">

  <main class="max-w-4xl mx-auto">
    <div class="flex flex-col sm:flex-row items-center justify-between mb-10 gap-4">
      <img src="/assets/regofixlogo.png" alt="REGO-FIX" class="h-12" onerror="this.src='https://alexrasa.store/assets/regofixlogo.png'">
      <div class="flex items-center gap-4">
        <div class="text-right border-r pr-4 border-gray-200">
          <span class="block text-[10px] font-black text-gray-400 uppercase">Consultor de Manufactura</span>
          <span class="text-sm font-bold text-[#28556C]">Miguel Alejandro Ramirez</span>
        </div>
        <img src="https://alexrasa.store/favicon.ico" class="h-8 w-8 grayscale opacity-50">
      </div>
    </div>

    <div class="rego-card overflow-hidden">
      <div class="p-6 md:p-10 border-b border-gray-100">
        <h1 class="text-3xl font-black text-[#28556C] mb-8 italic">Calculador de Alta Eficiencia</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="md:col-span-2">
            <label class="label-rego">¿Qué estamos comparando?</label>
            <select id="tipo_comparativa" class="input-rego bg-blue-50 border-blue-100 font-bold">
              <option value="competencia">Contra Holder Estándar (ER/Weldon)</option>
              <option value="optimizacion_pg">Ya tengo powRgrip (Quiero optimizar)</option>
            </select>
          </div>
          <div>
            <label class="label-rego">Aplicación</label>
            <select id="aplicacion" class="input-rego">
              <option value="Desbaste">Desbaste (HD)</option>
              <option value="Acabado">Acabado (Finishing)</option>
              <option value="Trocoidal">HEM / Trocoidal</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
          <div><label class="label-rego">Material</label><input id="material" class="input-rego" placeholder="P20, 304, etc."></div>
          <div><label class="label-rego">Ø Herr. (mm)</label><input id="diametro" class="input-rego" placeholder="12"></div>
          <div><label class="label-rego">Stick-out (mm)</label><input id="largo" class="input-rego" placeholder="45"></div>
          <div><label class="label-rego">Filos (Z)</label><input id="z" class="input-rego" value="4"></div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-6">
          <div class="col-span-1 md:col-span-1"><label class="label-rego">RPM Actual</label><input id="current_rpm" class="input-rego" placeholder="Ej: 5000"></div>
          <div class="col-span-1 md:col-span-1"><label class="label-rego">Avance Actual (mm/min)</label><input id="current_feed" class="input-rego" placeholder="Ej: 1200"></div>
          <div class="col-span-2 md:col-span-1"><label class="label-rego">Coolant</label><select id="coolant" class="input-rego"><option value="Interno">Interno</option><option value="Externo">Externo</option><option value="MQL">MQL/Aire</option></select></div>
        </div>

        <button id="btnCalcular" class="btn-rego mt-10" onclick="generarPropuestaIA()">Analizar y Mejorar Parámetros</button>
      </div>

      <div id="loading" class="hidden p-20 text-center"><div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-gray-100 border-t-red-600"></div></div>

      <div id="resultado" class="hidden p-6 md:p-10 bg-slate-50">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          
          <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <span class="badge-rego bg-green-100 text-green-700 mb-4 inline-block">Productividad +<span id="pct-mejora">0</span>%</span>
            <canvas id="chartProductividad" height="250"></canvas>
          </div>

          <div class="space-y-4">
            <div class="bg-[#28556C] text-white p-6 rounded-3xl">
              <h4 class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">Configuración REGO-FIX</h4>
              <p id="res-ensamble" class="text-xl font-black mb-1 italic">Cargando...</p>
              <div class="flex gap-4 mt-4">
                <div class="bg-white/10 p-2 rounded-xl flex-1 text-center border border-white/10">
                  <span class="block text-[8px] uppercase font-bold text-blue-200">Boquilla</span>
                  <span id="res-boquilla" class="text-sm font-black">---</span>
                </div>
                <div class="bg-white/10 p-2 rounded-xl flex-1 text-center border border-white/10">
                  <span class="block text-[8px] uppercase font-bold text-blue-200">Precisión (TIR)</span>
                  <span class="text-sm font-black">&lt; 0.003mm</span>
                </div>
              </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <table class="w-full text-xs">
                    <tr class="border-b border-gray-50"><td class="py-3 font-bold text-gray-400 uppercase">Parámetro</td><td class="text-right font-bold text-gray-400 uppercase">Actual</td><td class="text-right font-black text-red-600 uppercase">Mejorado</td></tr>
                    <tr class="border-b border-gray-50"><td class="py-3 font-bold">RPM</td><td id="td-rpm-act" class="text-right">---</td><td id="td-rpm-new" class="text-right font-black text-blue-900 text-sm">---</td></tr>
                    <tr class="border-b border-gray-50"><td class="py-3 font-bold">Avance (mm/min)</td><td id="td-feed-act" class="text-right">---</td><td id="td-feed-new" class="text-right font-black text-blue-900 text-sm">---</td></tr>
                    <tr><td class="py-3 font-bold">Ciclo/Pieza Est.</td><td class="text-right">100%</td><td id="td-ciclo" class="text-right font-black text-green-600 text-sm">---</td></tr>
                </table>
            </div>
          </div>
        </div>

        <div class="mt-8 bg-blue-50 border-l-4 border-[#28556C] p-6 rounded-r-2xl">
          <span class="block text-[10px] font-black text-[#28556C] uppercase mb-1">Nota Técnica de Ingeniería:</span>
          <p id="res-nota" class="text-xs text-slate-600 leading-relaxed font-medium italic"></p>
        </div>
      </div>
    </div>
  </main>

  <script>
    let chartInstance = null;

    async function generarPropuestaIA() {
      const btn = document.getElementById('btnCalcular');
      const dataReq = {
        comparativa: document.getElementById('tipo_comparativa').value,
        material: document.getElementById('material').value,
        diametro: document.getElementById('diametro').value,
        largo: document.getElementById('largo').value,
        z: document.getElementById('z').value,
        current_rpm: document.getElementById('current_rpm').value,
        current_feed: document.getElementById('current_feed').value,
        aplicacion: document.getElementById('aplicacion').value,
        coolant: document.getElementById('coolant').value
      };

      if(!dataReq.material || !dataReq.diametro) return alert("Ingresa Material y Diámetro.");

      btn.disabled = true;
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('resultado').classList.add('hidden');

      const prompt = `Eres un experto técnico de REGO-FIX.
      Datos: Comp: ${dataReq.comparativa}, Material: ${dataReq.material}, D: ${dataReq.diametro}mm, Largo: ${dataReq.largo}mm, Z: ${dataReq.z}, RPM Act: ${dataReq.current_rpm}, Feed Act: ${dataReq.current_feed}, Op: ${dataReq.aplicacion}.
      
      MISIÓN:
      1. Si es 'competencia', mejora RPM en 15% y Avance en 25% gracias a TIR < 3um.
      2. Si es 'optimizacion_pg', busca el límite del carburo mejorando avance un 10% adicional.
      3. Determina el Holder PG ideal (PG10, PG15, PG25 o PG32) y la boquilla exacta.
      
      Devuelve SOLO un JSON:
      { "new_rpm": num, "new_feed": num, "holder_reco": "string", "boquilla_reco": "string", "pct_mejora": num, "nota": "string" }`;

      try {
        const res = await fetch('/api/recommend.js', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: prompt })
        });

        const json = await res.json();
        const data = JSON.parse(json);

        // UI
        document.getElementById('res-ensamble').innerText = data.holder_reco;
        document.getElementById('res-boquilla').innerText = data.boquilla_reco;
        document.getElementById('res-nota').innerText = data.nota;
        document.getElementById('pct-mejora').innerText = data.pct_mejora;
        
        document.getElementById('td-rpm-act').innerText = dataReq.current_rpm || "---";
        document.getElementById('td-feed-act').innerText = dataReq.current_feed || "---";
        document.getElementById('td-rpm-new').innerText = data.new_rpm;
        document.getElementById('td-feed-new').innerText = data.new_feed;
        document.getElementById('td-ciclo').innerText = "-" + (100 - (100/(1+(data.pct_mejora/100)))).toFixed(1) + "%";

        renderChart(dataReq.current_feed || 1000, data.new_feed);

        document.getElementById('resultado').classList.remove('hidden');
      } catch (e) { alert("Error con la IA."); }
      finally { btn.disabled = false; document.getElementById('loading').classList.add('hidden'); }
    }

    function renderChart(act, nxt) {
      const ctx = document.getElementById('chartProductividad').getContext('2d');
      if(chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Actual', 'Optimizado'],
          datasets: [{
            label: 'Tasa de Remoción (MRR)',
            data: [act, nxt],
            backgroundColor: ['#e2e8f0', '#28556C'],
            borderRadius: 12
          }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { display: false } } }
      });
    }
  </script>
</body>
</html>
