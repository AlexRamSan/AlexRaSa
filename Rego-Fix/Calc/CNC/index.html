<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>REGO-FIX Manual Input Console</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --rego-red: #D31B23; --rego-blue: #28556C; }
    body { background: #f4f4f5; font-family: 'Inter', sans-serif; }
    .input-libre { width: 100%; border: 1px solid #d4d4d8; border-radius: 8px; padding: 0.75rem; font-weight: 600; outline: none; transition: 0.2s; color: #18181b; }
    .input-libre:focus { border-color: var(--rego-red); box-shadow: 0 0 0 3px rgba(211,27,35,0.1); }
    .lbl { font-size: 0.65rem; font-weight: 900; color: var(--rego-blue); text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 0.5px; }
    .data-box { background: white; border: 1px solid #e4e4e7; border-radius: 12px; padding: 1.5rem; }
  </style>
</head>
<body class="py-10 px-4">

  <main class="max-w-4xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-200">
    
    <div class="bg-gray-50 p-6 flex justify-between items-center border-b border-gray-200">
        <img src="/assets/regofixlogo.png" class="h-8" onerror="this.src='https://alexrasa.store/assets/regofixlogo.png'">
        <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Calculadora Manual Inteligente</span>
    </div>

    <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label class="lbl">Material de Pieza</label>
            <input id="material" type="text" class="input-libre" placeholder="Ej: Inconel 718 a 40 HRC">
        </div>
        <div>
            <label class="lbl">Material de Herramienta</label>
            <input id="herramienta" type="text" class="input-libre" placeholder="Ej: Fresa Carburo AlTiN">
        </div>
        <div>
            <label class="lbl">Interfaz de Máquina</label>
            <input id="interfaz" type="text" class="input-libre" placeholder="Ej: CAT 40 / HSK-A 63">
        </div>
        <div>
            <label class="lbl">Operación a Realizar</label>
            <input id="operacion" type="text" class="input-libre" placeholder="Ej: Desbaste HPC">
        </div>
        <div>
            <label class="lbl">Lubricación / Refrigerante</label>
            <input id="lubricacion" type="text" class="input-libre" placeholder="Ej: Interna Alta Presión / MQL">
        </div>
        <div class="grid grid-cols-3 gap-3">
            <div>
                <label class="lbl">Ø (mm)</label>
                <input id="diametro" type="number" step="0.1" class="input-libre text-center" value="12">
            </div>
            <div>
                <label class="lbl">Voladizo (mm)</label>
                <input id="largo" type="number" step="1" class="input-libre text-center" value="50" placeholder="Largo">
            </div>
            <div>
                <label class="lbl">Filos (Z)</label>
                <input id="z" type="number" class="input-libre text-center" value="4">
            </div>
        </div>
        
        <button onclick="procesarDatos()" id="btnGo" class="md:col-span-2 bg-[#D31B23] text-white font-black py-4 rounded-xl uppercase tracking-widest hover:bg-red-800 transition-colors">
            Generar Diagnóstico Técnico
        </button>
    </div>

    <div id="loader" class="hidden p-10 text-center text-red-600 font-bold text-sm uppercase">Analizando Reglas de Catálogo y Deflexión...</div>

    <div id="resultado" class="hidden p-8 border-t bg-gray-50">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="bg-[#28556C] text-white rounded-2xl p-6 shadow-md">
                <span class="text-[9px] uppercase font-bold opacity-70 tracking-widest">Sistema Sugerido</span>
                <h3 id="res-sistema" class="text-xl font-black mt-2">---</h3>
                <p id="res-pinza" class="text-[#B7C91F] text-xs font-bold mt-2">---</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="data-box text-center flex flex-col justify-center">
                    <span class="lbl m-0">RPM Sugeridas</span>
                    <span id="res-rpm" class="text-3xl font-black text-[#28556C]">0</span>
                </div>
                <div class="data-box text-center flex flex-col justify-center">
                    <span class="lbl m-0">Avance (mm/min)</span>
                    <span id="res-feed" class="text-3xl font-black text-[#28556C]">0</span>
                </div>
            </div>
        </div>
        
        <div class="bg-white p-6 rounded-2xl border-l-[6px] border-[#B7C91F] shadow-sm">
            <span id="res-mejora" class="text-[10px] font-black text-green-600 uppercase block mb-2 tracking-wider">---</span>
            <p id="res-nota" class="text-sm font-medium text-gray-700 leading-relaxed"></p>
        </div>
    </div>
  </main>

  <script>
    async function procesarDatos() {
        const btn = document.getElementById('btnGo');
        const data = {
            material: document.getElementById('material').value,
            herramienta: document.getElementById('herramienta').value,
            interfaz: document.getElementById('interfaz').value,
            operacion: document.getElementById('operacion').value,
            lubricacion: document.getElementById('lubricacion').value,
            diametro: document.getElementById('diametro').value,
            largo: document.getElementById('largo').value,
            z: document.getElementById('z').value
        };

        if(!data.material || !data.diametro || !data.largo) return alert("Material, Diámetro y Voladizo son obligatorios.");

        btn.disabled = true;
        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('resultado').classList.add('hidden');

        try {
            const res = await fetch('/api/cut-conditions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const r = await res.json();
            
            document.getElementById('res-sistema').innerText = r.sistema_recomendado;
            document.getElementById('res-pinza').innerText = r.pinza_sugerida;
            document.getElementById('res-rpm').innerText = Number(r.rpm_calculado).toLocaleString();
            document.getElementById('res-feed').innerText = Number(r.avance_calculado).toLocaleString();
            document.getElementById('res-mejora').innerText = r.mejora_esperada;
            document.getElementById('res-nota').innerText = r.dictamen_tecnico;
            
            document.getElementById('resultado').classList.remove('hidden');
        } catch(e) { 
            alert("Error conectando con el servidor de IA."); 
        } finally {
            btn.disabled = false;
            document.getElementById('loader').classList.add('hidden');
        }
    }
  </script>
</body>
</html>
