<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>REGO-FIX Smart Diagnostics | Miguel Ramirez</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --rego-red: #D31B23; --rego-blue: #28556C; }
    body { background: #f4f4f5; font-family: 'Inter', sans-serif; }
    .input-libre { width: 100%; border: 1px solid #d4d4d8; border-radius: 8px; padding: 0.75rem; font-weight: 600; outline: none; transition: 0.2s; color: #18181b; }
    .input-libre:focus { border-color: var(--rego-red); box-shadow: 0 0 0 3px rgba(211,27,35,0.1); }
    .lbl { font-size: 0.65rem; font-weight: 900; color: var(--rego-blue); text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 0.5px; }
    .data-box { background: white; border: 1px solid #e4e4e7; border-radius: 12px; padding: 1.5rem; }
    
    /* Toggle Switch Styles */
    .toggle-checkbox:checked { right: 0; border-color: var(--rego-red); background-color: var(--rego-red); }
    .toggle-checkbox:checked + .toggle-label { background-color: #fca5a5; }
  </style>
</head>
<body class="py-10 px-4">

  <main class="max-w-5xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-200">
    
    <div class="bg-gray-50 p-6 flex justify-between items-center border-b border-gray-200">
        <img src="/assets/regofixlogo.png" class="h-8" onerror="this.src='https://alexrasa.store/assets/regofixlogo.png'">
        <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Diagnóstico de Ingeniería a Pie de Máquina</span>
    </div>

    <div class="p-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            <div><label class="lbl">Material de Pieza</label><input id="material" type="text" class="input-libre" placeholder="Ej: Inconel 718"></div>
            <div><label class="lbl">Material de Herramienta</label><input id="herramienta" type="text" class="input-libre" placeholder="Ej: Carburo Sólido"></div>
            <div><label class="lbl">Interfaz de Máquina</label><input id="interfaz" type="text" class="input-libre" placeholder="Ej: CAT 40 / HSK 63"></div>
            
            <div><label class="lbl">Operación</label><input id="operacion" type="text" class="input-libre" placeholder="Ej: Desbaste HPC"></div>
            <div><label class="lbl">Lubricación</label><input id="lubricacion" type="text" class="input-libre" placeholder="Ej: Interna Alta Presión"></div>
            <div><label class="lbl">RPM Máximas (Máquina)</label><input id="max_rpm" type="number" class="input-libre font-bold text-red-600" value="12000" placeholder="Límite del husillo"></div>

            <div class="lg:col-span-3 grid grid-cols-3 gap-4">
                <div><label class="lbl">Ø (mm)</label><input id="diametro" type="number" step="0.1" class="input-libre text-center" value="12"></div>
                <div><label class="lbl">Voladizo (mm)</label><input id="largo" type="number" step="1" class="input-libre text-center" value="50"></div>
                <div><label class="lbl">Filos (Z)</label><input id="z" type="number" class="input-libre text-center" value="4"></div>
            </div>
        </div>

        <div class="bg-slate-50 border border-slate-200 p-5 rounded-xl mb-8">
            <div class="flex items-center mb-4">
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="toggle_actuales" onchange="toggleActuales()" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer border-gray-300 z-10"/>
                    <label for="toggle_actuales" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
                <label class="text-sm font-black text-slate-700 uppercase tracking-tight cursor-pointer" for="toggle_actuales">Tengo condiciones actuales a mejorar</label>
            </div>
            
            <div id="panel_actuales" class="hidden grid grid-cols-2 gap-4 transition-all">
                <div><label class="lbl">RPM Actuales</label><input id="rpm_actual" type="number" class="input-libre" placeholder="Ej: 4500"></div>
                <div><label class="lbl">Avance Actual (mm/min)</label><input id="avance_actual" type="number" class="input-libre" placeholder="Ej: 1200"></div>
            </div>
        </div>
        
        <button onclick="procesarDatos()" id="btnGo" class="w-full bg-[#D31B23] text-white font-black py-4 rounded-xl uppercase tracking-widest hover:bg-red-800 transition-colors shadow-lg">
            Generar Diagnóstico y Gráfica
        </button>
    </div>

    <div id="loader" class="hidden p-10 text-center text-[#28556C] font-black text-sm uppercase animate-pulse">Analizando Física de Corte y Límites de Husillo...</div>

    <div id="resultado" class="hidden border-t bg-gray-50 flex flex-col lg:flex-row">
        
        <div class="p-8 lg:w-1/2 flex flex-col gap-6">
            <div class="bg-[#28556C] text-white rounded-2xl p-6 shadow-md relative overflow-hidden">
                <span class="text-[9px] uppercase font-bold opacity-70 tracking-widest">Ensamble Sugerido</span>
                <h3 id="res-sistema" class="text-xl font-black mt-2">---</h3>
                <p id="res-pinza" class="text-[#B7C91F] text-sm font-bold mt-1">---</p>
                <div class="mt-4 pt-4 border-t border-white/20 flex justify-between">
                    <span class="text-xs font-bold text-blue-200">TIR &lt; 3µm</span>
                    <span class="text-xs font-bold text-blue-200">G 2.5 @ 25k</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="data-box text-center flex flex-col justify-center relative">
                    <span class="lbl m-0">RPM Sugeridas</span>
                    <span id="res-rpm" class="text-3xl font-black text-[#28556C]">0</span>
                    <span id="res-capping" class="hidden absolute top-2 right-2 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500" title="Topado al límite de máquina"></span></span>
                </div>
                <div class="data-box text-center flex flex-col justify-center">
                    <span class="lbl m-0">Avance (mm/min)</span>
                    <span id="res-feed" class="text-3xl font-black text-[#28556C]">0</span>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl border-l-[6px] border-[#B7C91F] shadow-sm">
                <p id="res-nota" class="text-sm font-medium text-gray-700 leading-relaxed italic"></p>
            </div>
        </div>

        <div id="area_grafica" class="hidden p-8 lg:w-1/2 bg-white border-l border-gray-200 flex-col justify-center items-center">
            <span id="res-mejora" class="bg-green-100 text-green-700 px-4 py-2 rounded-full text-xs font-black uppercase mb-6 tracking-widest shadow-sm">---</span>
            <div class="w-full h-64">
                <canvas id="chartMRR"></canvas>
            </div>
            <p class="text-[10px] text-gray-400 font-bold uppercase mt-4 text-center">Comparativa de Productividad de Avance (Vf)</p>
        </div>

    </div>
  </main>

  <script>
    let chartInstance = null;

    function toggleActuales() {
        const checked = document.getElementById('toggle_actuales').checked;
        const panel = document.getElementById('panel_actuales');
        if(checked) {
            panel.classList.remove('hidden');
        } else {
            panel.classList.add('hidden');
            document.getElementById('rpm_actual').value = '';
            document.getElementById('avance_actual').value = '';
        }
    }

    async function procesarDatos() {
        const btn = document.getElementById('btnGo');
        const isChecked = document.getElementById('toggle_actuales').checked;
        
        const data = {
            material: document.getElementById('material').value,
            herramienta: document.getElementById('herramienta').value,
            interfaz: document.getElementById('interfaz').value,
            operacion: document.getElementById('operacion').value,
            lubricacion: document.getElementById('lubricacion').value,
            max_rpm: document.getElementById('max_rpm').value,
            diametro: document.getElementById('diametro').value,
            largo: document.getElementById('largo').value,
            z: document.getElementById('z').value,
            tiene_actuales: isChecked,
            rpm_actual: document.getElementById('rpm_actual').value,
            avance_actual: document.getElementById('avance_actual').value
        };

        if(!data.material || !data.diametro || !data.largo) return alert("Material, Diámetro y Voladizo son requeridos.");
        if(isChecked && !data.avance_actual) return alert("Si activas las condiciones actuales, ingresa el Avance Actual para graficar.");

        btn.disabled = true;
        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('resultado').classList.add('hidden');
        document.getElementById('area_grafica').classList.add('hidden');

        try {
            const res = await fetch('/api/cut-conditions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const r = await res.json();
            
            // Inyectar datos de texto
            document.getElementById('res-sistema').innerText = r.sistema_recomendado;
            document.getElementById('res-pinza').innerText = r.pinza_sugerida;
            document.getElementById('res-rpm').innerText = Number(r.rpm_calculado).toLocaleString();
            document.getElementById('res-feed').innerText = Number(r.avance_calculado).toLocaleString();
            document.getElementById('res-nota').innerText = r.dictamen_tecnico;
            document.getElementById('res-mejora').innerText = r.mejora_esperada;

            // Mostrar punto rojo si se activó el Capping de RPM
            if(r.capping_activado) {
                document.getElementById('res-capping').classList.remove('hidden');
            } else {
                document.getElementById('res-capping').classList.add('hidden');
            }

            // Dibujar gráfica si hay condiciones actuales
            if(isChecked && data.avance_actual) {
                document.getElementById('area_grafica').classList.remove('hidden');
                document.getElementById('area_grafica').classList.add('flex');
                renderChart(parseFloat(data.avance_actual), parseFloat(r.avance_calculado));
            }
            
            document.getElementById('resultado').classList.remove('hidden');
        } catch(e) { 
            alert("Error conectando con el núcleo de REGO-FIX."); 
        } finally {
            btn.disabled = false;
            document.getElementById('loader').classList.add('hidden');
        }
    }

    function renderChart(actual, optimo) {
        const ctx = document.getElementById('chartMRR').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Proceso Actual', 'REGO-FIX Optimizado'],
                datasets: [{
                    data: [actual, optimo],
                    backgroundColor: ['#cbd5e1', '#28556C'],
                    borderRadius: 8,
                    barThickness: 60
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { display: false, grid: { display: false } },
                    x: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 11, family: 'Inter' } } }
                }
            }
        });
    }
  </script>
</body>
</html>
