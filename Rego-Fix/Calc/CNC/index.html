<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>REGO-FIX Cutting Expert | AlexRaSa</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <style>
    :root { --rego-red: #D31B23; --rego-blue: #28556C; --rego-green: #B7C91F; }
    body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', sans-serif; }
    .rego-card { background: white; border-radius: 24px; box-shadow: 0 20px 50px rgba(40,85,108,0.1); border: 1px solid rgba(40,85,108,0.1); }
    .input-rego { width: 100%; border: 1px solid #e2e8f0; border-radius: 12px; padding: 0.8rem; outline: none; transition: 0.2s; background: #fff; font-size: 0.95rem; }
    .input-rego:focus { border-color: var(--rego-blue); box-shadow: 0 0 0 4px rgba(40,85,108,0.08); }
    .btn-rego { background: var(--rego-red); color: white; font-weight: 800; border-radius: 14px; padding: 1.2rem; transition: 0.3s; width: 100%; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-rego:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(211,27,35,0.25); }
    .label-rego { display: block; font-size: 0.75rem; font-weight: 800; color: var(--rego-blue); text-transform: uppercase; margin-bottom: 0.5rem; }
  </style>
</head>
<body class="py-10 px-4">

  <main class="max-w-4xl mx-auto" id="area-reporte">
    
    <div class="flex flex-col md:flex-row items-center justify-between mb-10 gap-6">
      <img src="/assets/regofixlogo.png" alt="REGO-FIX" class="h-12" onerror="this.src='https://alexrasa.store/assets/regofixlogo.png'">
      <div class="text-center md:text-right">
        <h2 class="text-xl font-black text-[#28556C] italic uppercase tracking-tighter">Guía de Ingeniería Inteligente</h2>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Consultor: Miguel Alejandro Ramirez</p>
      </div>
    </div>

    <div class="rego-card overflow-hidden">
      <div class="p-6 md:p-10 border-b border-gray-100 no-print" id="form-calculadora">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
          <div>
            <label class="label-rego">Material de la Pieza</label>
            <input id="material" class="input-rego" placeholder="Ej: P20, 4140, Inox 304">
          </div>
          <div>
            <label class="label-rego">Tipo de Operación</label>
            <select id="aplicacion" class="input-rego font-bold">
              <option value="Desbaste">Desbaste Pesado (HD)</option>
              <option value="Acabado">Acabado Superficial</option>
              <option value="Trocoidal">Alta Eficiencia (HEM)</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
          <div><label class="label-rego">Ø Herr. (mm)</label><input id="diametro" type="number" step="0.1" class="input-rego" placeholder="12"></div>
          <div><label class="label-rego">Stick-out (mm)</label><input id="largo" type="number" class="input-rego" placeholder="45"></div>
          <div><label class="label-rego">Filos (Z)</label><input id="z" type="number" class="input-rego" value="4"></div>
          <div><label class="label-rego">RPM Actual</label><input id="rpm_act" type="number" class="input-rego" placeholder="5000"></div>
        </div>

        <div class="mb-8">
            <label class="label-rego">Avance Actual (mm/min)</label>
            <input id="feed_act" type="number" class="input-rego" placeholder="1200">
        </div>

        <button id="btnEjecutar" class="btn-rego" onclick="calcularOptimizacion()">
          Analizar y Optimizar con IA
        </button>
      </div>

      <div id="loading" class="hidden p-20 text-center">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-gray-100 border-t-red-600"></div>
        <p class="mt-4 text-xs font-black text-gray-400 uppercase tracking-widest italic">Calculando Deflexión...</p>
      </div>

      <div id="resultado" class="hidden p-6 md:p-10 bg-slate-50">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
          <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-black uppercase mb-4 inline-block" id="badge-mejora">+0%</span>
            <canvas id="graficaProductividad" height="250"></canvas>
          </div>

          <div class="space-y-6">
            <div class="bg-[#28556C] text-white p-8 rounded-3xl shadow-xl">
              <h4 class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">Ensamble Recomendado</h4>
              <p id="txt-holder" class="text-2xl font-black italic mb-1">PG --</p>
              <p id="txt-boquilla" class="text-sm font-bold text-[#B7C91F]">Boquilla: --</p>
              <div class="mt-6 flex gap-3 text-center">
                <div class="bg-white/10 rounded-xl p-3 flex-1"><span class="block text-[8px] font-bold opacity-60 uppercase italic">TIR</span><span class="text-xs font-black">&lt; 0.003mm</span></div>
                <div class="bg-white/10 rounded-xl p-3 flex-1"><span class="block text-[8px] font-bold opacity-60 uppercase italic">Balanceo</span><span class="text-xs font-black">G2.5 @ 25k</span></div>
              </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-gray-100">
              <table class="w-full text-xs">
                <tr class="border-b border-gray-50 text-gray-400 font-bold uppercase"><td class="py-2">Parámetro</td><td class="text-right">Base</td><td class="text-right text-red-600">REGO-FIX</td></tr>
                <tr class="border-b border-gray-50"><td class="py-3 font-bold">RPM</td><td id="val-rpm-a" class="text-right">---</td><td id="val-rpm-n" class="text-right font-black text-blue-900 text-sm">---</td></tr>
                <tr><td class="py-3 font-bold">Avance</td><td id="val-feed-a" class="text-right">---</td><td id="val-feed-n" class="text-right font-black text-blue-900 text-sm">---</td></tr>
              </table>
            </div>
          </div>
        </div>

        <div class="mt-10 bg-white border-l-8 border-[#B7C91F] p-8 rounded-2xl shadow-sm">
          <p id="txt-nota" class="text-sm text-slate-600 leading-relaxed font-medium italic"></p>
        </div>

        <div class="mt-8 no-print flex gap-4">
            <button onclick="generarPDF()" class="bg-black text-white text-[10px] font-black px-6 py-4 rounded-xl uppercase flex-1">Exportar PDF</button>
            <button onclick="window.location.reload()" class="bg-gray-200 text-gray-600 text-[10px] font-black px-6 py-4 rounded-xl uppercase">Reset</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    let chartInstance = null;

    async function calcularOptimizacion() {
      // Elementos de la UI
      const btn = document.getElementById('btnEjecutar');
      const resultadoDiv = document.getElementById('resultado');
      const loadingDiv = document.getElementById('loading');

      // Obtener valores con validación
      const getVal = (id) => document.getElementById(id) ? document.getElementById(id).value : null;

      const params = {
        material: getVal('material'),
        aplicacion: getVal('aplicacion'),
        diametro: getVal('diametro'),
        largo: getVal('largo'),
        z: getVal('z'), // Aquí era el error
        rpm_act: getVal('rpm_act'),
        feed_act: getVal('feed_act')
      };

      if (!params.material || !params.diametro || !params.z) {
          alert("Faltan datos críticos para el cálculo.");
          return;
      }

      btn.disabled = true;
      loadingDiv.classList.remove('hidden');
      resultadoDiv.classList.add('hidden');

      try {
        const response = await fetch('/api/cut-conditions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(params)
        });

        const data = await response.json();

        // Inyectar Resultados
        document.getElementById('txt-holder').innerText = data.holder_reco;
        document.getElementById('txt-boquilla').innerText = "Boquilla Sugerida: " + data.boquilla_reco;
        document.getElementById('val-rpm-a').innerText = params.rpm_act || "---";
        document.getElementById('val-feed-a').innerText = params.feed_act || "---";
        document.getElementById('val-rpm-n').innerText = data.new_rpm;
        document.getElementById('val-feed-n').innerText = data.new_feed;
        document.getElementById('badge-mejora').innerText = "+" + data.pct_gain + "% Productividad";
        document.getElementById('txt-nota').innerText = data.nota;

        dibujarGrafica(params.feed_act || 1000, data.new_feed);

        resultadoDiv.classList.remove('hidden');
      } catch (err) {
        alert("Error en el servidor de ingeniería. Verifica tu API de Vercel.");
      } finally {
        btn.disabled = false;
        loadingDiv.classList.add('hidden');
      }
    }

    function dibujarGrafica(actual, optimo) {
      const ctx = document.getElementById('graficaProductividad').getContext('2d');
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Actual', 'REGO-FIX'],
          datasets: [{
            data: [actual, optimo],
            backgroundColor: ['#e2e8f0', '#28556C'],
            borderRadius: 12
          }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { display: false } } }
      });
    }

    function generarPDF() {
        const element = document.getElementById('area-reporte');
        document.querySelectorAll('.no-print').forEach(el => el.classList.add('hidden'));
        html2pdf().from(element).save().then(() => {
            document.querySelectorAll('.no-print').forEach(el => el.classList.remove('hidden'));
        });
    }
  </script>
</body>
</html>
