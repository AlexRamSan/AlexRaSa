<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGO-FIX | Voice Assistant</title>
    <style>
        :root { 
            --rf-blue: #0044BB; 
            --rf-lime: #76FF03; 
            --rf-bg: #F4F7F6; 
            --rf-white: #FFFFFF;
            --rf-text: #2C3E50;
            --rf-grey: #D1D8E0;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--rf-bg); 
            color: var(--rf-text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: var(--rf-white); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06); 
            width: 100%; 
            max-width: 420px; 
            text-align: center;
            border-top: 6px solid var(--rf-blue);
        }

        .logo { max-width: 160px; margin-bottom: 20px; }
        
        h2 { color: var(--rf-blue); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .sub { font-size: 11px; color: #7F8C8D; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 1px; }

        /* Botón de Micrófono Estilizado */
        .mic-container { position: relative; width: 120px; height: 120px; margin: 0 auto 25px; }
        
        .mic-btn { 
            width: 100%; height: 100%; border-radius: 50%; border: none; 
            background: var(--rf-blue); color: white; font-size: 45px; 
            cursor: pointer; transition: 0.3s; 
            display: flex; align-items: center; justify-content: center;
            z-index: 2; position: relative;
        }

        .mic-btn.recording { 
            background: var(--rf-lime); 
            color: #000;
            box-shadow: 0 0 25px rgba(118, 255, 3, 0.5);
        }

        /* Ondas de sonido cuando graba */
        .waves {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; background: var(--rf-lime);
            opacity: 0; z-index: 1; top: 0; left: 0;
        }
        .recording + .waves { animation: pulse 1.5s infinite; opacity: 0.4; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .status { font-weight: bold; font-size: 13px; color: var(--rf-blue); margin-bottom: 20px; height: 20px; text-transform: uppercase; }

        .result-box { 
            background: #F9FBFC; border: 1px solid var(--rf-grey); 
            border-radius: 6px; padding: 20px; text-align: left; 
            display: none; animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .transcript { font-style: italic; color: #95a5a6; font-size: 13px; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .message { font-size: 15px; line-height: 1.5; color: var(--rf-text); }
    </style>
</head>
<body>

<div class="card">
    <img src="/assets/regofixlogo.png" class="logo" alt="REGO-FIX">
    <h2>Asistente</h2>
    <div class="sub">Voz a Salesforce</div>
    
    <div id="status" class="status">Pulsa para hablar</div>

    <div class="mic-container">
        <button class="mic-btn" id="micBtn">🎤</button>
        <div class="waves"></div>
    </div>
    
    <div id="resultBox" class="result-box">
        <div class="transcript" id="transcript"></div>
        <div class="message" id="message"></div>
    </div>
</div>

<script>
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const transcriptText = document.getElementById('transcript');
    const messageText = document.getElementById('message');

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    micBtn.onclick = async () => {
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    processAudio(audioBlob);
                };

                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('recording');
                statusText.innerText = "Escuchando...";
                resultBox.style.display = 'none';
            } catch (err) {
                alert("Permiso de micrófono denegado.");
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            micBtn.classList.remove('recording');
            statusText.innerText = "Procesando...";
        }
    };

    async function processAudio(blob) {
        const formData = new FormData();
        formData.append('audio', blob, 'audio.webm');

        try {
            const response = await fetch('https://alex-ra-sa.vercel.app/api/asistente', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.success) {
                resultBox.style.display = 'block';
                transcriptText.innerText = `"${data.transcript}"`;
                messageText.innerText = data.message;
                statusText.innerText = "Listo";
            } else {
                statusText.innerText = "Error";
                alert("Error: " + data.error);
            }
        } catch (e) {
            statusText.innerText = "Error de conexión";
        }
    }
</script>

</body>
</html>
