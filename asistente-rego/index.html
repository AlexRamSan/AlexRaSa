<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGO-FIX | Full Assistant</title>
    <style>
        :root { --rf-blue: #0044BB; --rf-lime: #76FF03; --rf-bg: #F4F7F6; --rf-white: #FFFFFF; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--rf-bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: var(--rf-white); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; border-top: 6px solid var(--rf-blue); }
        .logo { max-width: 140px; margin-bottom: 20px; }
        
        .mic-btn { width: 90px; height: 90px; border-radius: 50%; border: none; background: var(--rf-blue); color: white; font-size: 35px; cursor: pointer; transition: 0.3s; margin: 20px 0; }
        .mic-btn.recording { background: var(--rf-lime); color: #000; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .status { font-weight: bold; font-size: 12px; color: var(--rf-blue); text-transform: uppercase; margin-bottom: 10px; }
        
        /* Lista de Cuentas */
        .account-list { text-align: left; margin-top: 20px; display: none; }
        .account-item { 
            background: #f9f9f9; padding: 12px; border: 1px solid #ddd; 
            border-radius: 6px; margin-bottom: 8px; cursor: pointer; transition: 0.2s;
        }
        .account-item:hover { border-color: var(--rf-blue); background: #eef4ff; }
        .account-item span { display: block; font-size: 11px; color: #777; }

        .result-box { background: #F0F4F8; padding: 15px; border-radius: 6px; margin-top: 20px; text-align: left; display: none; border-left: 4px solid var(--rf-blue); }
        .transcript { font-style: italic; color: #888; font-size: 13px; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="card">
    <img src="/assets/regofixlogo.png" class="logo">
    <h2>Voz a Salesforce</h2>
    <div id="status" class="status">Pulsa el micro para dictar</div>

    <button class="mic-btn" id="micBtn">🎤</button>

    <div id="resultBox" class="result-box">
        <div class="transcript" id="transcript"></div>
        <div id="aiMessage"></div>
    </div>

    <div id="accountSection" class="account-list">
        <p style="font-size: 13px; font-weight: bold;">Selecciona la cuenta correcta:</p>
        <div id="listContainer"></div>
    </div>
</div>

<script>
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const aiMessage = document.getElementById('aiMessage');
    const accountSection = document.getElementById('accountSection');
    const listContainer = document.getElementById('listContainer');

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let lastPlan = null;

    micBtn.onclick = async () => {
        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = () => processAudio(new Blob(audioChunks, { type: 'audio/webm' }));
            mediaRecorder.start();
            isRecording = true;
            micBtn.classList.add('recording');
            statusText.innerText = "Escuchando...";
            accountSection.style.display = 'none';
        } else {
            mediaRecorder.stop();
            isRecording = false;
            micBtn.classList.remove('recording');
            statusText.innerText = "Analizando...";
        }
    };

    async function processAudio(blob) {
        const formData = new FormData();
        formData.append('audio', blob);

        try {
            const res = await fetch('/api/asistente', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.success) {
                lastPlan = data.plan;
                resultBox.style.display = 'block';
                document.getElementById('transcript').innerText = `"${data.transcript}"`;
                
                if (data.needSelection) {
                    aiMessage.innerText = `He encontrado ${data.accounts.length} coincidencias. Selecciona la correcta abajo:`;
                    showAccountList(data.accounts);
                } else {
                    aiMessage.innerText = "No encontré ninguna cuenta con ese nombre. Prueba de nuevo.";
                }
                statusText.innerText = "Listo";
            }
        } catch (e) { alert("Error de conexión"); }
    }

    function showAccountList(accounts) {
        listContainer.innerHTML = '';
        accountSection.style.display = 'block';
        
        accounts.forEach(acc => {
            const div = document.createElement('div');
            div.className = 'account-item';
            div.innerHTML = `<strong>${acc.Name}</strong><span>${acc.BillingCity || 'Ciudad no registrada'}</span>`;
            div.onclick = () => confirmarRegistro(acc.Id, acc.Name);
            listContainer.appendChild(div);
        });
    }

    async function confirmarRegistro(accountId, accountName) {
        statusText.innerText = "Sincronizando...";
        const payload = {
            accountId: accountId,
            subject: lastPlan.asunto || "Registro de voz",
            description: lastPlan.detalles,
            taskType: lastPlan.intent === 'AGENDAR_CITA' ? 'EVENTO' : 'TAREA',
            fecha: lastPlan.fecha,
            hora: lastPlan.hora
        };

        const formData = new FormData();
        formData.append('action', 'confirmar');
        formData.append('payload', JSON.stringify(payload));

        const res = await fetch('/api/asistente', { method: 'POST', body: formData });
        const result = await res.json();
        
        if (result.success) {
            aiMessage.innerText = `✅ Registro guardado exitosamente en la cuenta: ${accountName}`;
            accountSection.style.display = 'none';
            statusText.innerText = "Completado";
        }
    }
</script>
</body>
</html>
