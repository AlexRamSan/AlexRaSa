<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGO-FIX | Full Assistant</title>
    <style>
        :root { --rf-blue: #0044BB; --rf-lime: #76FF03; --rf-bg: #F4F7F6; --rf-white: #FFFFFF; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--rf-bg); padding: 20px; display: flex; justify-content: center; margin: 0; }
        .card { background: var(--rf-white); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; border-top: 6px solid var(--rf-blue); margin-top: 20px; }
        .logo { max-width: 140px; margin-bottom: 20px; }
        .mic-btn { width: 90px; height: 90px; border-radius: 50%; border: none; background: var(--rf-blue); color: white; font-size: 35px; cursor: pointer; transition: 0.3s; margin: 20px 0; }
        .mic-btn.recording { background: var(--rf-lime); color: #000; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .status { font-weight: bold; font-size: 13px; color: var(--rf-blue); text-transform: uppercase; margin-bottom: 10px; }
        .result-box { background: #f0f4f8; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; display: none; border-left: 5px solid var(--rf-blue); }
        .transcript { font-style: italic; color: #7f8c8d; font-size: 12px; margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .account-item { background: #fff; padding: 12px; border: 1px solid #d1d8e0; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
        .account-item:hover { border-color: var(--rf-blue); background: #f4f8ff; }
    </style>
</head>
<body>

<div class="card">
    <img src="/assets/regofixlogo.png" class="logo">
    <h2>Asistente</h2>
    <div id="status" class="status">Pulsa para hablar</div>
    <button class="mic-btn" id="micBtn">🎤</button>

    <div id="resultBox" class="result-box">
        <div class="transcript" id="transcript"></div>
        <div id="aiMessage"></div>
        <div id="listContainer" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const aiMessage = document.getElementById('aiMessage');
    const listContainer = document.getElementById('listContainer');

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let lastPlan = null;

    micBtn.onclick = async () => {
        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                processAudio(blob);
            };
            mediaRecorder.start();
            isRecording = true;
            micBtn.classList.add('recording');
            statusText.innerText = "Escuchando...";
            resultBox.style.display = 'none';
        } else {
            mediaRecorder.stop();
            isRecording = false;
            micBtn.classList.remove('recording');
            statusText.innerText = "Analizando...";
        }
    };

    async function processAudio(blob) {
        const formData = new FormData();
        // IMPORTANTE: Ponemos nombre al archivo para evitar Error 400
        formData.append('audio', blob, 'recording.webm'); 

        try {
            const res = await fetch('https://alex-ra-sa.vercel.app/api/asistente', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.success) {
                resultBox.style.display = 'block';
                document.getElementById('transcript').innerText = `"${data.transcript}"`;
                
                if (data.message) {
                    aiMessage.innerText = data.message;
                } else if (data.needSelection) {
                    lastPlan = data.plan;
                    aiMessage.innerText = "Selecciona la cuenta:";
                    listContainer.innerHTML = '';
                    data.accounts.forEach(acc => {
                        const div = document.createElement('div');
                        div.className = 'account-item';
                        div.innerHTML = `<strong>${acc.Name}</strong><br><small>${acc.BillingCity || ''}</small>`;
                        div.onclick = () => confirmar(acc.Id, acc.Name);
                        listContainer.appendChild(div);
                    });
                } else {
                    aiMessage.innerText = "No encontré la empresa.";
                }
                statusText.innerText = "Listo";
            } else {
                alert("Error: " + data.error);
                statusText.innerText = "Error";
            }
        } catch (e) { statusText.innerText = "Error Red"; }
    }

    async function confirmar(id, name) {
        statusText.innerText = "Sincronizando...";
        const formData = new FormData();
        formData.append('action', 'confirmar');
        formData.append('payload', JSON.stringify({
            accountId: id,
            subject: lastPlan.asunto,
            description: lastPlan.detalles,
            taskType: lastPlan.intent === 'AGENDAR_CITA' ? 'EVENTO' : 'TAREA',
            fecha: lastPlan.fecha,
            hora: lastPlan.hora
        }));

        const res = await fetch('https://alex-ra-sa.vercel.app/api/asistente', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) {
            aiMessage.innerHTML = `<b style="color:green">✅ Guardado en ${name}</b>`;
            listContainer.innerHTML = '';
            statusText.innerText = "Completado";
        }
    }
</script>
</body>
</html>
